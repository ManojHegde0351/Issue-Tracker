<div class="auth-container">
  <div class="auth-wrapper">
    <div class="auth-header">
      <button class="back-btn" (click)="goToLandingPage()" title="Back to Home">
        <span>←</span>
      </button>
      <h1 class="auth-title">Welcome Back</h1>
      <p class="auth-subtitle">Sign in to your Issue Tracker Pro account</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="auth-form">
      <div class="form-group">
        <label for="email">
          Email Address
        </label>
        <input
          type="email"
          id="email"
          formControlName="email"
          placeholder="Enter your email address"
          [class.error]="loginForm.get('email')?.invalid && loginForm.get('email')?.touched"
        />
        <div class="error-message" *ngIf="loginForm.get('email')?.invalid && loginForm.get('email')?.touched">
          <span *ngIf="loginForm.get('email')?.errors?.['required']">Email is required</span>
          <span *ngIf="loginForm.get('email')?.errors?.['email']">Please enter a valid email</span>
        </div>
      </div>

      <div class="form-group">
        <label for="password">
          Password
        </label>
        <input
          type="password"
          id="password"
          formControlName="password"
          placeholder="Enter your password"
          [class.error]="loginForm.get('password')?.invalid && loginForm.get('password')?.touched"
        />
        <div class="error-message" *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched">
          <span *ngIf="loginForm.get('password')?.errors?.['required']">Password is required</span>
          <span *ngIf="loginForm.get('password')?.errors?.['minlength']">Password must be at least 6 characters</span>
        </div>
      </div>

      <div class="error-message" *ngIf="errorMessage">
        <span>{{ errorMessage }}</span>
      </div>

      <button type="submit" class="btn-primary auth-btn" [disabled]="loginForm.invalid || isLoading">
        <span class="btn-icon loading-spinner" *ngIf="isLoading">⏳</span>
        {{ isLoading ? 'Signing In...' : 'Sign In' }}
      </button>

      <div class="auth-divider">
        <span>or</span>
      </div>

      <button type="button" class="btn-secondary auth-btn" (click)="goToRegister()">
        Create New Account
      </button>
    </form>

  </div>
</div>
